# Security Headers Configuration (Refined for any website)
security_headers:
  required:
    - Strict-Transport-Security
    - Content-Security-Policy
    - X-Frame-Options
    - X-Content-Type-Options
    - Referrer-Policy
    - Permissions-Policy

  recommended:
    - Cache-Control
    - Cross-Origin-Embedder-Policy
    - Cross-Origin-Opener-Policy
    - Cross-Origin-Resource-Policy
    - X-DNS-Prefetch-Control
    - X-Robots-Tag
    - Clear-Site-Data            # meaningful only on logout / sensitive pages
    - Reporting-Endpoints        # modern equivalent of Report-To

  # Deprecated or dangerous headers – warn but don't recommend implementing
  deprecated:
    - Expect-CT
    - Public-Key-Pins
    - Feature-Policy             # superseded by Permissions-Policy
    - X-Download-Options         # IE8 only
    - X-Permitted-Cross-Domain-Policies  # Flash/PDF rare

  # Real information-disclosure headers (sensitive)
  vulnerable:
    - Server
    - X-Powered-By
    - X-AspNet-Version
    - X-AspNetMvc-Version
    - X-Runtime
    - X-Version
    - X-Generator
    - X-Drupal-Cache
    - X-Pingback
    - X-Engine
    - X-PHP-Version
    - X-PHP-Platform
    - X-Request-Id             # tracing ID, can be leaked if not UUID
    - X-Cache-Info
    - X-Cache-Hits
    - X-Backend-Server
    - X-Served-By
    - X-Host
    - X-Backend
    - X-Server
    - X-Content-Duration
    - X-Source-Scheme
    - X-Original-URL
    - X-Rewrite-URL
    - X-Content-Type
    - X-UA-Compatible
    - X-Wap-Profile
    - X-ATT-DeviceId

  # Infrastructure/cdn headers – flagged as info only, no score penalty
  infrastructure:
    - Via
    - X-Varnish
    - X-Amz-Cf-Id
    - X-Amz-Cf-Pop
    - CF-Ray
    - CF-Cache-Status
    - X-Google-Cache-Control
    - X-Forwarded-Server
    - X-Forwarded-Host
    - X-Forwarded-Proto
    - X-Firefox-Security-Policy      # legacy Firefox CSP, low risk
    - X-WebKit-CSP                   # legacy WebKit CSP
    - X-Content-Security-Policy
    - X-Content-Security-Policy-Report-Only
    - X-Request-Id                  # often added by load balancers, informational

# Scanner Configuration
scanner:
  timeout: 10
  max_redirects: 5
  user_agent: "ChSecurityHeaderAnalyzer/2.0"   # bumped version
  verify_ssl: true
  follow_redirects: true
  thread_count: 10
  rate_limit: 10  # requests per second

# Reporting Configuration
reporting:
  default_output_dir: "./reports"
  formats:
    - txt
    - json
    - csv
    - html
  include_timestamp: true
  compress_reports: false

# Vulnerabilities Configuration
vulnerabilities:
  missing_headers:
    critical: 
      - Strict-Transport-Security
      - Content-Security-Policy
    high: 
      - X-Frame-Options
      - X-Content-Type-Options
    medium: 
      - Referrer-Policy
      - Permissions-Policy

  weak_configurations:
    hsts:
      max_age_minimum: 31536000    # 1 year
      include_subdomains: true
      preload: true                # recommended but not required for scoring
    csp:
      unsafe_inline: false
      unsafe_eval: false
      https_required: true
    cookie:
      secure_required: true
      httponly_required: true
      samesite_required: "Lax"     # Lax is the modern safe baseline
    cors:
      wildcard_allowed: false
      credentials_with_wildcard: false
      methods_exposed: ["GET", "POST", "HEAD", "OPTIONS", "PUT", "DELETE"]  # allowed safe/rest methods
    cache:
      # Only flag issues if no-store is missing on HTML pages (context dependent).
      # We lower severity to "info" for static resources (analyst note).
      no_store_required: false
      no_cache_required: false
      private_required: false
      must_revalidate_required: false

# Grading Configuration – used by the analyzer to calculate score
grading:
  # Adjust deductions to be realistic
  missing_critical: -10
  missing_high: -7
  missing_medium: -4
  recommended_missing: -2
  vulnerable_header_found: -8        # real info leak
  infrastructure_header_found: 0     # no deduction
  deprecated_header_found: -2
  weak_configuration: -5
  bonus_present_required: 3
  bonus_present_recommended: 2
  bonus_strong_csp: 10
  bonus_strong_hsts: 10

  grade_thresholds:
    A: 85
    B: 70
    C: 55
    D: 35
    F: 0

# Additional Checks Configuration
additional_checks:
  check_cookie_flags: true
  check_csp_directives: true
  check_cors_configuration: true
  check_hsts_preload_status: false   # set true to check preload eligibility
  check_ssl_certificate: true
  check_tls_version: true            # not yet implemented in scanner
  check_http_methods: true
  check_server_banner: true
# Security Headers Configuration
security_headers:
  required:
    - Strict-Transport-Security
    - Content-Security-Policy
    - X-Frame-Options
    - X-Content-Type-Options
    - Referrer-Policy
    - Permissions-Policy
    - Set-Cookie
    - Access-Control-Allow-Origin
    - Access-Control-Allow-Credentials
  
  recommended:
    - Cache-Control
    - Clear-Site-Data
    - Cross-Origin-Embedder-Policy
    - Cross-Origin-Opener-Policy
    - Cross-Origin-Resource-Policy
    - X-Permitted-Cross-Domain-Policies
    - X-Download-Options
    - Content-Type
    - X-DNS-Prefetch-Control
    - Expect-CT
    - Feature-Policy
    - Public-Key-Pins
    - X-Robots-Tag
    - X-Request-ID
  
  vulnerable_headers:
    - Server
    - X-Powered-By
    - X-AspNet-Version
    - X-AspNetMvc-Version
    - X-Runtime
    - X-Version
    - X-Generator
    - X-Drupal-Cache
    - X-Pingback
    - X-Backend-Server
    - X-Served-By
    - X-Host
    - X-Backend
    - X-Server
    - X-Engine
    - X-PHP-Version
    - X-PHP-Platform
    - X-Request-Id
    - X-Cache-Info
    - X-Cache-Hits
    - Via
    - X-Varnish
    - X-Amz-Cf-Id
    - X-Amz-Cf-Pop
    - CF-Ray
    - CF-Cache-Status
    - X-Google-Cache-Control
    - X-Source-Scheme
    - X-Forwarded-Server
    - X-Forwarded-Host
    - X-Forwarded-Proto
    - X-Original-URL
    - X-Rewrite-URL
    - X-Content-Type
    - X-UA-Compatible
    - X-Wap-Profile
    - X-ATT-DeviceId
    - X-Content-Duration
    - X-Content-Security-Policy
    - X-WebKit-CSP
    - X-Content-Security-Policy-Report-Only
    - X-Firefox-Security-Policy
    - X-XSS-Protection

# Scanner Configuration
scanner:
  timeout: 10
  max_redirects: 5
  user_agent: "ChSecurityHeaderAnalyzer/1.0"
  verify_ssl: true
  follow_redirects: true
  thread_count: 10
  rate_limit: 10  # requests per second

# Reporting Configuration
reporting:
  default_output_dir: "./reports"
  formats:
    - txt
    - json
    - csv
    - html
  include_timestamp: true
  compress_reports: false

# Vulnerabilities Configuration
vulnerabilities:
  missing_headers:
    critical: 
      - Strict-Transport-Security
      - Content-Security-Policy
      - Set-Cookie
    high: 
      - X-Frame-Options
      - X-Content-Type-Options
      - Access-Control-Allow-Origin
      - Access-Control-Allow-Credentials
    medium: 
      - Referrer-Policy
      - Permissions-Policy
  
  weak_configurations:
    hsts:
      max_age_minimum: 31536000
      include_subdomains: true
      preload: true
    
    csp:
      unsafe_inline: false
      unsafe_eval: false
      https_required: true
    
    cookie:
      secure_required: true
      httponly_required: true
      samesite_required: "Strict"
    
    cors:
      wildcard_allowed: false
      credentials_with_wildcard: false
      methods_exposed: ["GET", "POST", "HEAD", "OPTIONS"]
    
    cache:
      no_store_required: true
      no_cache_required: false
      private_required: true
      must_revalidate_required: true

# Grading Configuration
grading:
  score_weights:
    required_header: 10
    recommended_header: 5
    vulnerable_header_found: -15
    weak_configuration: -5
  
  grade_thresholds:
    A: 80
    B: 65
    C: 50
    D: 35
    F: 0

# Additional Checks Configuration
additional_checks:
  check_cookie_flags: true
  check_csp_directives: true
  check_cors_configuration: true
  check_hsts_preload_status: false
  check_ssl_certificate: true
  check_tls_version: true
  check_http_methods: true
  check_server_banner: true